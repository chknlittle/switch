services:
  falkordb:
    image: falkordb/falkordb
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - ./data/falkordb:/var/lib/falkordb/data
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    ports:
      - "8888:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    restart: unless-stopped
